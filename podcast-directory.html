<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240px, initial-scale=1.0">
                            <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2714%27%20fill%3D%27%236f42c1%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2752%25%27%20font-size%3D%2744%27%20text-anchor%3D%27middle%27%20dominant-baseline%3D%27middle%27%20font-family%3D%27Apple%20Color%20Emoji%2CSegoe%20UI%20Emoji%2CSegoe%20UI%20Symbol%2CEmojiSymbols%2Csans-serif%27%20fill%3D%27%23ffffff%27%3E%F0%9F%8E%A7%3C%2Ftext%3E%3C%2Fsvg%3E">
    <title>Podcasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            background: #000;
            color: #fff;
            padding: 5px;
            max-width: 240px;
        }

        .header {
            position: sticky;
            top: 0;
            background: #000;
            z-index: 100;
            padding-bottom: 5px;
            border-bottom: 2px solid #fff;
        }

        .back-btn {
            display: inline-block;
            padding: 4px 8px;
            margin: 5px 0;
            background: #222;
            color: #f90;
            text-decoration: none;
            font-size: 11px;
            border-radius: 3px;
        }

        .back-btn:active { background: #333; }

        h1 { font-size: 16px; text-align: center; padding: 8px 0; margin: 0; }

        .show-tabs {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .tab {
            padding: 5px 10px;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tab.active { background: #f90; color: #000; border-color: #f90; }

        .refresh-btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #f90;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        .last-update { text-align: center; font-size: 10px; color: #666; margin: 4px 0; }

        .episode {
            background: #111;
            margin: 4px 0;
            padding: 5px;
            border-left: 3px solid #f90;
            cursor: pointer;
        }

        .episode.active-ep { border-left-color: #0ff; background: #001a1a; }
        .episode:active { background: #222; }

        .episode-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #fff;
            line-height: 1.3;
        }

        .episode-meta { font-size: 10px; color: #888; }

        .episode-progress {
            font-size: 9px;
            color: #0ff;
            margin-top: 2px;
        }

        /* Player bar */
        .player-bar {
            position: sticky;
            bottom: 0;
            background: #111;
            border-top: 2px solid #f90;
            padding: 5px;
            display: none;
        }

        .now-playing-label { font-size: 9px; color: #f90; margin-bottom: 2px; }

        .now-playing-title {
            font-size: 10px;
            color: #fff;
            margin-bottom: 4px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        audio { width: 100%; }

        .skip-btns {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .skip-btn {
            flex: 1;
            padding: 6px 0;
            background: #222;
            color: #f90;
            border: 1px solid #444;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
        }

        .skip-btn:active { background: #333; }

        .loading { text-align: center; padding: 20px; color: #888; }
        .error { text-align: center; padding: 10px; color: #f00; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="home.html" class="back-btn">← Back</a>
        <h1>🎙 PODCASTS</h1>
        <div class="last-update" id="currentDate"></div>
    </div>

    <div class="show-tabs" id="showTabs"></div>

    <button class="refresh-btn" onclick="loadEpisodes()">↻ REFRESH</button>
    <div class="last-update" id="lastUpdate"></div>

    <div id="content">
        <div class="loading">Loading...</div>
    </div>

    <div class="player-bar" id="playerBar">
        <div class="now-playing-label">NOW PLAYING</div>
        <div class="now-playing-title" id="nowPlayingTitle"></div>
        <audio id="audio" controls preload="none"></audio>
        <div class="skip-btns">
            <button class="skip-btn" onclick="skip(-30)">« 30s</button>
            <button class="skip-btn" onclick="skip(-10)">« 10s</button>
            <button class="skip-btn" onclick="skip(10)">10s »</button>
            <button class="skip-btn" onclick="skip(30)">30s »</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'podcast_progress';
        let currentShow = 0;
        let shows = [];
        let currentUrl = null;

        // --- localStorage helpers ---
        function saveProgress(url, position) {
            try {
                const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                all[url] = { position: position, saved: Date.now() };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
            } catch(e) {}
        }

        function getProgress(url) {
            try {
                const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                return all[url] ? all[url].position : 0;
            } catch(e) { return 0; }
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = Math.floor(secs % 60);
            if (h > 0) return h + 'h ' + m + 'm';
            if (m > 0) return m + 'm ' + s + 's';
            return s + 's';
        }

        // --- Audio setup ---
        const audio = document.getElementById('audio');

        // Save position every 5 seconds while playing
        audio.addEventListener('timeupdate', function() {
            if (currentUrl && audio.currentTime > 5) {
                // Save every 5 seconds (throttled)
                if (Math.floor(audio.currentTime) % 5 === 0) {
                    saveProgress(currentUrl, audio.currentTime);
                }
            }
        });

        // Also save on pause/unload so nothing is lost
        audio.addEventListener('pause', function() {
            if (currentUrl) saveProgress(currentUrl, audio.currentTime);
        });

        window.addEventListener('beforeunload', function() {
            if (currentUrl) saveProgress(currentUrl, audio.currentTime);
        });

        function skip(seconds) {
            audio.currentTime = Math.max(0, audio.currentTime + seconds);
        }

        // --- Build All tab ---
        function buildAllTab(rawShows) {
            const all = [];
            for (let s = 0; s < rawShows.length; s++) {
                const show = rawShows[s];
                if (!show.episodes) continue;
                for (let e = 0; e < show.episodes.length; e++) {
                    const ep = show.episodes[e];
                    all.push({
                        title: ep.title,
                        date: ep.date,
                        dateSort: ep.dateSort || '',
                        audioUrl: ep.audioUrl,
                        showName: show.name
                    });
                }
            }
            all.sort((a, b) => {
                if (a.dateSort > b.dateSort) return -1;
                if (a.dateSort < b.dateSort) return 1;
                return 0;
            });
            return { name: 'All', episodes: all };
        }

        // --- Render ---
        function renderTabs() {
            const container = document.getElementById('showTabs');
            container.innerHTML = '';
            shows.forEach((show, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab' + (i === currentShow ? ' active' : '');
                btn.textContent = show.name;
                btn.addEventListener('click', function() {
                    currentShow = i;
                    document.querySelectorAll('.tab').forEach((t, j) => {
                        if (j === i) t.classList.add('active');
                        else t.classList.remove('active');
                    });
                    renderEpisodes();
                });
                container.appendChild(btn);
            });
        }

        function renderEpisodes() {
            const content = document.getElementById('content');
            const show = shows[currentShow];

            if (!show || !show.episodes || !show.episodes.length) {
                content.innerHTML = '<div class="error">No episodes available.</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < show.episodes.length; i++) {
                const ep = show.episodes[i];
                if (!ep.audioUrl) continue;

                const meta = (ep.showName ? ep.showName + ' · ' : '') + (ep.date || '');
                const saved = getProgress(ep.audioUrl);
                const progressText = saved > 10 ? '▶ Resume at ' + formatTime(saved) : '';
                const isActive = ep.audioUrl === currentUrl;

                html += `<div class="episode${isActive ? ' active-ep' : ''}" onclick="playEpisode('${ep.audioUrl.replace(/'/g, "\\'")}', '${ep.title.replace(/'/g, "\\'")}')">
                    <div class="episode-title">${ep.title}</div>
                    <div class="episode-meta">${meta}</div>
                    ${progressText ? '<div class="episode-progress">' + progressText + '</div>' : ''}
                </div>`;
            }

            content.innerHTML = html || '<div class="error">No playable episodes.</div>';

            const now = new Date();
            document.getElementById('currentDate').textContent =
                now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            document.getElementById('lastUpdate').textContent =
                'Updated: ' + now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function playEpisode(url, title) {
            currentUrl = url;
            const bar = document.getElementById('playerBar');
            document.getElementById('nowPlayingTitle').textContent = title;

            const saved = getProgress(url);

            // Only set src and seek if this is a different episode
            // Avoids re-downloading if user taps the same episode again
            if (audio.dataset.loadedUrl !== url) {
                audio.src = url;
                audio.dataset.loadedUrl = url;

                if (saved > 10) {
                    // Seek only once metadata is ready — no double-buffer on range-supporting servers
                    // On servers without range support this still downloads once, not twice
                    audio.addEventListener('canplay', function onCanPlay() {
                        audio.currentTime = saved;
                        audio.removeEventListener('canplay', onCanPlay);
                    });
                }
            }

            bar.style.display = 'block';
            try { audio.play(); } catch(e) {}

            renderEpisodes();
        }

        async function loadEpisodes() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const response = await fetch('podcast-manifest.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const raw = await response.json();
                if (!raw.length) { content.innerHTML = '<div class="error">No shows found.</div>'; return; }
                shows = [buildAllTab(raw)].concat(raw);
                currentShow = 0;
                renderTabs();
                renderEpisodes();
            } catch(e) {
                content.innerHTML = '<div class="error">Could not load manifest.</div>';
            }
        }

        loadEpisodes();
    </script>
</body>
</html>
