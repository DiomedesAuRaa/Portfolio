<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podcasts</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f7;
        --bg-card: #ffffff;
        --text: #111111;
        --text-muted: #666666;
        --accent: #0057ff;
        --accent-soft: #e0ebff;
        --border: #dddddd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 0.75rem 1rem;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      header h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.5rem 0 0.75rem;
      }

      .shows-container {
        padding: 0 0.75rem;
      }

      .shows-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin: 0 0 0.25rem;
      }

      .shows-list {
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        padding-bottom: 0.25rem;
      }

      .show-button {
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text);
        border-radius: 999px;
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
        white-space: nowrap;
        min-width: 3.5rem;
        text-align: center;
        flex-shrink: 0;
        cursor: pointer;
      }

      /* Enhanced focus states for flip phone D-Pad navigation */
      .show-button:focus,
      .episode-button:focus,
      audio:focus {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
        background-color: var(--accent-soft);
      }

      .show-button.selected {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent);
      }

      .episodes-container {
        margin: 0.25rem 0 0;
        padding: 0 0.75rem 0.5rem;
      }

      .episodes-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.25rem;
      }

      .episodes-title {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .episodes-count {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .status-text {
        font-size: 0.8rem;
        color: var(--text-muted);
        padding: 0.5rem 0;
      }

      .episodes-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border-radius: 0.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        max-height: 50vh;
        overflow-y: auto;
      }

      .episode-item {
        border-bottom: 1px solid var(--border);
      }

      .episode-button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.65rem 0.75rem;
        background: transparent;
        border: none;
        cursor: pointer;
      }

      .episode-title {
        font-size: 0.9rem;
        margin-bottom: 0.15rem;
      }

      .episode-date {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .episode-item:last-child {
        border-bottom: none;
      }

      .player-container {
        border-top: 1px solid var(--border);
        background: var(--bg-card);
        padding: 0.4rem 0.75rem 0.6rem;
        position: sticky;
        bottom: 0;
      }

      .now-playing-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 0.1rem;
      }

      .now-playing-title {
        font-size: 0.8rem;
        margin-bottom: 0.25rem;
        /* Better text truncation for long episode titles */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      audio {
        width: 100%;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Podcasts</h1>
      </header>
      <main>
        <section class="shows-container" aria-label="Podcast shows">
          <p class="shows-label">Shows</p>
          <div class="shows-list" id="shows"></div>
        </section>

        <section
          class="episodes-container"
          aria-label="Episodes"
          id="episodesSection"
        >
          <div class="episodes-header">
            <div class="episodes-title" id="episodesTitle">Episodes</div>
            <div class="episodes-count" id="episodesCount"></div>
          </div>
          <div class="status-text" id="statusText">
            Choose a show to load episodes.
          </div>
          <ul class="episodes-list" id="episodesList" aria-live="polite"></ul>
        </section>
      </main>

      <section
        class="player-container hidden"
        id="playerContainer"
        aria-label="Now playing"
      >
        <div class="now-playing-label">Now playing</div>
        <div class="now-playing-title" id="nowPlayingTitle"></div>
        <audio id="audio" controls preload="none"></audio>
      </section>
    </div>

    <script>
      (function () {
        const shows = [
          { name: "Bill Simmons Podcast", url: "https://feeds.megaphone.fm/the-bill-simmons-podcast" },
          { name: "The Watch", url: "https://feeds.megaphone.fm/the-watch" },
          { name: "Zach Lowe", url: "https://feeds.megaphone.fm/zach-lowe" },
          { name: "Joel Klatt", url: "https://feeds.feedburner.com/BreakingTheHuddle" },
          { name: "With the Perrys", url: "https://feeds.simplecast.com/wZpv0WKy" },
          { name: "Shally", url: "https://www.shallowford.church/sermons?format=rss" },
          { name: "Village Church", url: "http://feeds.thevillagechurch.net/sermons" },
          { name: "Ringer Tailgate", url: "https://feeds.megaphone.fm/GLT4074129955" },
          { name: "Big Picture", url: "https://feeds.megaphone.fm/the-big-picture" },
          { name: "Knowing Faith", url: "https://feeds.simplecast.com/V2lHo6VQ" },
          { name: "P1 with Matt and Tommy", url: "https://feeds.acast.com/public/shows/63e24225436c36001119fc66" },
        ];

        const showsContainer = document.getElementById("shows");
        const episodesList = document.getElementById("episodesList");
        const episodesTitle = document.getElementById("episodesTitle");
        const episodesCount = document.getElementById("episodesCount");
        const statusText = document.getElementById("statusText");
        const playerContainer = document.getElementById("playerContainer");
        const nowPlayingTitle = document.getElementById("nowPlayingTitle");
        const audio = document.getElementById("audio");

        const MAX_EPISODES = 5;
        let currentShowIndex = 0;

        function setStatus(message) {
          statusText.textContent = message;
          statusText.classList.remove("hidden");
        }

        function clearStatus() {
          statusText.textContent = "";
          statusText.classList.add("hidden");
        }

        function renderShows() {
          showsContainer.innerHTML = "";
          shows.forEach((show, index) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "show-button" + (index === currentShowIndex ? " selected" : "");
            btn.textContent = show.name;
            btn.setAttribute("aria-pressed", index === currentShowIndex);
            btn.addEventListener("click", () => {
              if (currentShowIndex === index) return;
              currentShowIndex = index;
              updateSelectedShowButtons();
              loadFeed(show);
            });
            showsContainer.appendChild(btn);
          });
        }

        function updateSelectedShowButtons() {
          const buttons = showsContainer.querySelectorAll(".show-button");
          buttons.forEach((btn, index) => {
            const selected = index === currentShowIndex;
            btn.classList.toggle("selected", selected);
            btn.setAttribute("aria-pressed", selected);
          });
        }

        // Reliably fetch the feed. Tries direct first, falls back to a proxy if blocked by CORS.
        async function fetchFeedWithFallback(feedUrl) {
          try {
            const resp = await fetch(feedUrl);
            if (!resp.ok) throw new Error("Direct fetch failed");
            return await resp.text();
          } catch (err) {
            // Fallback to proxy if a CORS or network error occurs
            const encoded = encodeURIComponent(feedUrl);
            const proxyUrl = "https://api.allorigins.win/get?url=" + encoded;
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Proxy fetch failed");
            const data = await response.json();
            return data.contents || "";
          }
        }

        async function loadFeed(show) {
          episodesTitle.textContent = show.name;
          episodesCount.textContent = "";
          episodesList.innerHTML = "";
          setStatus("Loading episodes...");

          try {
            const xmlString = await fetchFeedWithFallback(show.url);
            if (!xmlString) throw new Error("Empty feed");
            
            // Parse full XML safely, then slice the array to limit DOM elements
            const episodes = parseRss(xmlString).slice(0, MAX_EPISODES);

            if (!episodes.length) {
              episodesCount.textContent = "";
              episodesList.innerHTML = "";
              setStatus("No episodes found.");
              return;
            }

            episodesCount.textContent = episodes.length + " episodes";
            renderEpisodes(episodes);
            clearStatus();
          } catch (error) {
            console.error(error);
            episodesList.innerHTML = "";
            episodesCount.textContent = "";
            setStatus("Could not load episodes.");
          }
        }

        function parseRss(xmlString) {
          try {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, "application/xml");
            const items = Array.from(doc.getElementsByTagName("item"));
            
            if (!items.length) {
              const entries = Array.from(doc.getElementsByTagName("entry"));
              if (!entries.length) return [];
              return entries.map((entry) => mapEntryToEpisode(entry));
            }
            return items.map((item) => mapItemToEpisode(item));
          } catch (e) {
            return [];
          }
        }

        function textContentOrNull(parent, tagName) {
          const el = parent.getElementsByTagName(tagName)[0];
          return el ? el.textContent.trim() : null;
        }

        function mapItemToEpisode(item) {
          const title = textContentOrNull(item, "title") || "Untitled episode";
          const pubDate = textContentOrNull(item, "pubDate");
          let audioUrl = null;

          const enclosure = item.getElementsByTagName("enclosure")[0];
          if (enclosure && enclosure.getAttribute("url")) {
            audioUrl = enclosure.getAttribute("url");
          } else {
            const link = textContentOrNull(item, "link");
            if (link && /^https?:\/\//i.test(link)) {
              audioUrl = link;
            }
          }

          return { title, dateText: formatDate(pubDate), audioUrl };
        }

        function mapEntryToEpisode(entry) {
          const title = textContentOrNull(entry, "title") || "Untitled episode";
          const pubDate = textContentOrNull(entry, "updated") || textContentOrNull(entry, "published");
          let audioUrl = null;

          const links = Array.from(entry.getElementsByTagName("link"));
          const audioLink = links.find((l) => {
            const rel = l.getAttribute("rel");
            const type = l.getAttribute("type") || "";
            return (
              (rel === "enclosure" || type.indexOf("audio/") === 0 || type.indexOf("mpeg") !== -1) &&
              l.getAttribute("href")
            );
          });
          
          if (audioLink) {
            audioUrl = audioLink.getAttribute("href");
          } else {
            const hrefLink = links.find((l) => l.getAttribute("href"));
            if (hrefLink) audioUrl = hrefLink.getAttribute("href");
          }

          return { title, dateText: formatDate(pubDate), audioUrl };
        }

        function formatDate(raw) {
          if (!raw) return "";
          const date = new Date(raw);
          if (!isNaN(date.getTime())) {
            try {
              return date.toLocaleDateString(undefined, {
                year: "numeric", month: "short", day: "numeric",
              });
            } catch (e) {
              return date.toISOString().slice(0, 10);
            }
          }
          return raw;
        }

        function renderEpisodes(episodes) {
          episodesList.innerHTML = "";

          episodes.forEach((episode) => {
            const li = document.createElement("li");
            li.className = "episode-item";

            const button = document.createElement("button");
            button.type = "button";
            button.className = "episode-button";
            button.disabled = !episode.audioUrl;

            const titleEl = document.createElement("div");
            titleEl.className = "episode-title";
            titleEl.textContent = episode.title;

            const dateEl = document.createElement("div");
            date.className = "episode-date";
            dateEl.textContent = episode.dateText || "";

            button.appendChild(titleEl);
            button.appendChild(dateEl);

            if (episode.audioUrl) {
              button.addEventListener("click", () => playEpisode(episode));
            } else {
              dateEl.textContent = (episode.dateText || "") + " (no audio)";
            }

            li.appendChild(button);
            episodesList.appendChild(li);
          });
        }

        function playEpisode(episode) {
          if (!episode.audioUrl) return;
          audio.src = episode.audioUrl;
          nowPlayingTitle.textContent = episode.title;
          playerContainer.classList.remove("hidden");
          audio.play().catch(() => {
            // Mobile browsers often block autoplay; user can just hit the play button
          });
        }

        function init() {
          renderShows();
          if (shows.length > 0) {
            loadFeed(shows[0]);
          }
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
