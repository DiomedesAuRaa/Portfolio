<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2714%27%20fill%3D%27%2523ffffff%27%2F%3E%3Cpath%20d%3D%27M16%2034%20L32%2018%20L48%2034%20V48%20H38%20V36%20H26%20V48%20H16%20Z%27%20fill%3D%27%25230a0f1f%27%2F%3E%3C%2Fsvg%3E">
    <title>DiomedesAuRaa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        
        .container { text-align: center; max-width: 600px; width: 100%; }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d4ff, #0ff, #00ffa3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        
        .tagline { font-size: 1.2em; color: #aaa; margin-bottom: 50px; }
        
        .section-heading {
            font-size: 1.5em;
            color: #00d4ff;
            margin: 30px 0 20px 0;
            text-align: center;
            font-weight: 600;
        }
        .section-heading.games-heading { color: #ff6314; }
        
        .buttons { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn {
            display: block;
            width: 100%;
            max-width: 400px;
            padding: 20px 40px;
            font-size: 1.2em;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        .btn:active { transform: translateY(0); }
        
        .btn-sports { border-color: #ffd700; }
        .btn-sports:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }
        .btn-portfolio { border-color: #00d4ff; }
        .btn-portfolio:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .btn-contact { border-color: #00ffa3; }
        .btn-contact:hover {
            background: rgba(0, 255, 163, 0.1);
            border-color: #00ffa3;
            box-shadow: 0 10px 30px rgba(0, 255, 163, 0.3);
        }
        .btn-game { border-color: #ff4500; }
        .btn-game:hover {
            background: rgba(255, 69, 0, 0.12);
            border-color: #ff6314;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
        }

        /* 3-up games row */
        .games-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }
        .games-row .btn {
            flex: 1;
            padding: 18px 6px;
            font-size: 1em;
        }

        .icon { margin-right: 10px; font-size: 1.4em; }
        
        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            .btn { padding: 15px 30px; font-size: 1em; }
            .games-row .btn { padding: 14px 4px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DiomedesAuRaa</h1>
        <p class="tagline">What's good.</p>
        
        <h2 class="section-heading">Flip Phone Pages</h2>
        <div class="buttons">
            <a href="sports-scores.html" class="btn btn-sports"><span class="icon">🏆</span>Sports Scores</a>
            <a href="standings.html"     class="btn btn-sports"><span class="icon">📊</span>Standings</a>
            <a href="news.html"          class="btn btn-sports"><span class="icon">📰</span>News Headlines</a>
            <a href="weather.html"       class="btn btn-sports"><span class="icon">🌤️</span>Weather</a>
            <a href="bible.html"         class="btn btn-sports"><span class="icon">📖</span>Bible (ESV)</a>
            <a href="reddit-digest.html" class="btn btn-sports"><span class="icon">🔴</span>Reddit Digest</a>
            <a href="podcast-directory.html" class="btn btn-sports"><span class="icon">🎧</span>Podcast Directory</a>
        </div>

        <h2 class="section-heading games-heading">🎮 Games</h2>
        <div class="buttons">
            <div class="games-row">
                <a href="games/2048.html"        class="btn btn-game"><span class="icon">🟧</span>2048</a>
                <a href="games/snake.html"        class="btn btn-game"><span class="icon">🐍</span>Snake</a>
                <a href="games/minesweeper.html"  class="btn btn-game"><span class="icon">💣</span>Mines</a>
            </div>
            <div class="games-row">
                <a href="games/tetris.html"      class="btn btn-game"><span class="icon">🧱</span>Tetris</a>
                <a href="games/wordle.html"       class="btn btn-game"><span class="icon">🟩</span>Wordle</a>
            </div>
        </div>
        
        <h2 class="section-heading">Other</h2>
        <div class="buttons">
            <a href="./"           class="btn btn-portfolio"><span class="icon">💼</span>Portfolio</a>
            <a href="contact.html" class="btn btn-contact"><span class="icon">📧</span>Contact Me</a>
        </div>
    </div>
</body>
</html>
