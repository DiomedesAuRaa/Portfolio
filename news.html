<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240px, initial-scale=1.0">
                      <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2714%27%20fill%3D%27%23dc3545%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2752%25%27%20font-size%3D%2744%27%20text-anchor%3D%27middle%27%20dominant-baseline%3D%27middle%27%20font-family%3D%27Apple%20Color%20Emoji%2CSegoe%20UI%20Emoji%2CSegoe%20UI%20Symbol%2CEmojiSymbols%2Csans-serif%27%20fill%3D%27%23ffffff%27%3E%F0%9F%93%B0%3C%2Ftext%3E%3C%2Fsvg%3E">
  <title>News Headlines</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      font-size: 12px;
      background: #000;
      color: #fff;
      padding: 5px;
      max-width: 240px;
    }

    .header {
      position: sticky;
      top: 0;
      background: #000;
      z-index: 100;
      padding-bottom: 4px;
      border-bottom: 2px solid #f90;
    }
    .back-btn {
      display: inline-block;
      padding: 4px 8px;
      margin: 4px 0;
      background: #222;
      color: #f90;
      text-decoration: none;
      font-size: 11px;
      border-radius: 3px;
    }
    .back-btn:active { background: #333; }

    h1 { font-size: 15px; text-align: center; padding: 5px 0 2px; }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #666;
      padding: 2px 0;
    }

    /* Category tabs — horizontal scroll */
    .tabs {
      display: flex;
      gap: 4px;
      margin: 6px 0 4px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 4px 9px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: #f90; color: #000; border-color: #f90; font-weight: bold; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 4px;
      margin: 4px 0;
    }
    .refresh-btn {
      flex: 1;
      padding: 6px;
      background: #f90;
      color: #000;
      border: none;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    .refresh-btn:active { background: #e80; }
    .refresh-btn:disabled { background: #555; color: #888; }

    /* Feed progress */
    .progress-bar {
      height: 2px;
      background: #222;
      margin: 3px 0;
      border-radius: 1px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #f90;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Sections */
    .news-section {
      margin-bottom: 10px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 6px;
    }
    .source-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      padding: 2px 0;
    }
    .source-title { font-size: 13px; font-weight: bold; color: #f90; }
    .source-count { font-size: 10px; color: #555; }

    .article {
      background: #0d0d0d;
      margin: 3px 0;
      padding: 5px;
      border-left: 3px solid #f90;
      text-decoration: none;
      display: block;
      color: inherit;
      border-radius: 0 2px 2px 0;
    }
    .article:active { background: #1a1a1a; }
    .article-title {
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 2px;
      color: #fff;
      line-height: 1.3;
    }
    .article-meta { font-size: 10px; color: #666; }

    /* Status states */
    .loading-feed {
      padding: 6px 4px;
      color: #555;
      font-size: 11px;
      font-style: italic;
    }
    .error-feed {
      padding: 5px 4px;
      color: #933;
      font-size: 10px;
      border-left: 2px solid #633;
      background: #0d0000;
      margin: 2px 0;
    }
    .cached-badge {
      font-size: 9px;
      color: #555;
      margin-left: 4px;
    }

    /* Cache info */
    .cache-info {
      font-size: 10px;
      color: #444;
      text-align: center;
      padding: 4px 0;
    }
  </style>
</head>
<body>

<div class="header">
  <a href="home.html" class="back-btn">← Back</a>
  <h1>📰 NEWS</h1>
  <div class="meta-row">
    <span id="current-date"></span>
    <span id="last-update"></span>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="top">Top</button>
  <button class="tab" data-cat="general">World</button>
  <button class="tab" data-cat="tech">Tech</button>
  <button class="tab" data-cat="sports">Sports</button>
  <button class="tab" data-cat="business">Business</button>
  <button class="tab" data-cat="science">Science</button>
  <button class="tab" data-cat="devops">DevOps</button>
</div>

<div class="toolbar">
  <button class="refresh-btn" id="refresh-btn" onclick="loadCategory(currentCat, true)">↻ REFRESH</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="cache-info" id="cache-info"></div>

<div id="content"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   FEEDS — chosen for open RSS + proxy compatibility
   RSSHub (rsshub.app) re-exposes feeds that block direct RSS
   All feeds confirmed to work via rss2json or allorigins
═══════════════════════════════════════════════════════════ */
const FEEDS = {
  top: [
    { name:'AP News',      url:'https://rsshub.app/apnews/topics/ap-top-news',           limit:6 },
    { name:'NPR',          url:'https://feeds.npr.org/1001/rss.xml',                      limit:5 },
    { name:'BBC News',     url:'https://feeds.bbci.co.uk/news/rss.xml',                   limit:5 },
    { name:'Reuters',      url:'https://rsshub.app/reuters/world',                        limit:4 },
  ],
  general: [
    { name:'AP World',     url:'https://rsshub.app/apnews/topics/world-news',             limit:5 },
    { name:'BBC World',    url:'https://feeds.bbci.co.uk/news/world/rss.xml',             limit:5 },
    { name:'Al Jazeera',   url:'https://www.aljazeera.com/xml/rss/all.xml',               limit:5 },
    { name:'The Guardian', url:'https://www.theguardian.com/world/rss',                   limit:4 },
    { name:'NPR World',    url:'https://feeds.npr.org/1004/rss.xml',                      limit:4 },
  ],
  tech: [
    { name:'Hacker News',  url:'https://hnrss.org/frontpage',                             limit:6 },
    { name:'Ars Technica', url:'https://feeds.arstechnica.com/arstechnica/index',         limit:5 },
    { name:'The Verge',    url:'https://www.theverge.com/rss/index.xml',                  limit:5 },
    { name:'Wired',        url:'https://www.wired.com/feed/rss',                          limit:4 },
    { name:'MIT Tech Rev', url:'https://www.technologyreview.com/stories.rss',            limit:4 },
  ],
  sports: [
    { name:'ESPN',         url:'https://www.espn.com/espn/rss/news',                      limit:5 },
    { name:'CBS Sports',   url:'https://www.cbssports.com/rss/headlines',                 limit:5 },
    { name:'The Athletic', url:'https://rsshub.app/theathletic/news',                     limit:4 },
    { name:'Yahoo Sports', url:'https://sports.yahoo.com/rss/',                           limit:4 },
    { name:'Bleacher Rep', url:'https://bleacherreport.com/articles/feed',                limit:4 },
  ],
  business: [
    { name:'MarketWatch',  url:'https://feeds.marketwatch.com/marketwatch/topstories/',   limit:5 },
    { name:'CNBC',         url:'https://www.cnbc.com/id/100003114/device/rss/rss.html',  limit:5 },
    { name:'FT Markets',   url:'https://www.ft.com/rss/home/us',                          limit:4 },
    { name:'Investopedia', url:'https://www.investopedia.com/feedbuilder/feed/getfeed/?feedName=rss_headline', limit:4 },
  ],
  science: [
    { name:'Science Daily',url:'https://www.sciencedaily.com/rss/all.xml',                limit:5 },
    { name:'NASA',         url:'https://www.nasa.gov/rss/dyn/breaking_news.rss',          limit:4 },
    { name:'New Scientist',url:'https://www.newscientist.com/feed/home',                  limit:4 },
    { name:'Nature',       url:'https://www.nature.com/nature.rss',                       limit:4 },
  ],
  devops: [
    { name:'Hacker News',  url:'https://hnrss.org/frontpage?q=kubernetes+OR+terraform+OR+devops+OR+SRE+OR+platform', limit:5 },
    { name:'The New Stack',url:'https://thenewstack.io/feed/',                             limit:5 },
    { name:'DevOps.com',   url:'https://devops.com/feed/',                                limit:5 },
    { name:'CNCF Blog',    url:'https://www.cncf.io/feed/',                               limit:4 },
    { name:'SRE Weekly',   url:'https://sreweekly.com/feed/',                             limit:4 },
  ],
};

/* ── Proxy waterfall ─────────────────────────────────────── */
// Each proxy tried in order; first to succeed wins
const PROXIES = [
  // rss2json — most reliable, handles most feeds natively
  (url) => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10&api_key=`,
  // allorigins — CORS proxy, returns raw XML we parse ourselves
  (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  // corsproxy.io — another CORS passthrough
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

const TIMEOUT_MS = 8000;
const CACHE_TTL  = 5 * 60 * 1000; // 5 minutes
const CACHE_KEY  = (cat) => `news_cache_${cat}`;

let currentCat = 'top';
let abortControllers = [];

/* ── Fetch with timeout ──────────────────────────────────── */
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  abortControllers.push(ctrl);
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal })
    .finally(() => clearTimeout(timer));
}

/* ── Parse response from each proxy format ───────────────── */
function parseRss2json(json) {
  if(json.status !== 'ok' || !json.items?.length) return null;
  return json.items.map(i => ({
    title:   i.title   || '',
    link:    i.link    || i.guid || '',
    pubDate: i.pubDate || '',
  }));
}

function parseXML(xmlString) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlString, 'text/xml');
    const items = doc.querySelectorAll('item, entry');
    if(!items.length) return null;
    return Array.from(items).map(item => ({
      title:   item.querySelector('title')?.textContent?.trim() || '',
      link:    item.querySelector('link')?.textContent?.trim()
            || item.querySelector('link')?.getAttribute('href') || '',
      pubDate: item.querySelector('pubDate, published, updated')?.textContent || '',
    }));
  } catch { return null; }
}

async function fetchFeed(feedUrl) {
  // Proxy 0: rss2json
  try {
    const res = await fetchWithTimeout(PROXIES[0](feedUrl), TIMEOUT_MS);
    if(res.ok) {
      const json = await res.json();
      const items = parseRss2json(json);
      if(items?.length) return items;
    }
  } catch(e) { if(e.name==='AbortError') throw e; }

  // Proxy 1: allorigins (returns {contents: rawXML})
  try {
    const res = await fetchWithTimeout(PROXIES[1](feedUrl), TIMEOUT_MS);
    if(res.ok) {
      const json = await res.json();
      const items = parseXML(json.contents || '');
      if(items?.length) return items;
    }
  } catch(e) { if(e.name==='AbortError') throw e; }

  // Proxy 2: corsproxy.io (returns raw XML directly)
  try {
    const res = await fetchWithTimeout(PROXIES[2](feedUrl), TIMEOUT_MS);
    if(res.ok) {
      const text = await res.text();
      const items = parseXML(text);
      if(items?.length) return items;
    }
  } catch(e) { if(e.name==='AbortError') throw e; }

  return null; // all proxies failed
}

/* ── Time formatting ─────────────────────────────────────── */
function fmtTime(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d)) return '';
  const diff = Date.now() - d;
  const m = Math.floor(diff/60000);
  const h = Math.floor(m/60);
  const dy = Math.floor(h/24);
  if(m < 2)   return 'just now';
  if(m < 60)  return `${m}m ago`;
  if(h < 24)  return `${h}h ago`;
  if(dy < 7)  return `${dy}d ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

/* ── Cache ───────────────────────────────────────────────── */
function cacheGet(cat) {
  try {
    const raw = sessionStorage.getItem(CACHE_KEY(cat));
    if(!raw) return null;
    const { ts, html } = JSON.parse(raw);
    if(Date.now() - ts > CACHE_TTL) return null;
    return { html, age: Math.round((Date.now()-ts)/1000) };
  } catch { return null; }
}
function cacheSet(cat, html) {
  try { sessionStorage.setItem(CACHE_KEY(cat), JSON.stringify({ts:Date.now(),html})); } catch {}
}

/* ── Render one article ──────────────────────────────────── */
function renderArticle(a) {
  const title = a.title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/<[^>]+>/g,'').trim();
  const link  = a.link || '#';
  const time  = fmtTime(a.pubDate);
  return `<a href="${link}" target="_blank" class="article">
    <div class="article-title">${title}</div>
    ${time?`<div class="article-meta">${time}</div>`:''}
  </a>`;
}

/* ── Main loader ─────────────────────────────────────────── */
async function loadCategory(cat, forceRefresh=false) {
  // Cancel any in-flight requests
  abortControllers.forEach(c => { try{c.abort()}catch{} });
  abortControllers = [];
  currentCat = cat;

  // Tabs UI
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.cat===cat));

  const content   = document.getElementById('content');
  const progress  = document.getElementById('progress');
  const cacheInfo = document.getElementById('cache-info');
  const btn       = document.getElementById('refresh-btn');

  // Check cache first
  if(!forceRefresh) {
    const cached = cacheGet(cat);
    if(cached) {
      content.innerHTML = cached.html;
      cacheInfo.textContent = `Cached ${cached.age}s ago — tap Refresh to update`;
      return;
    }
  }

  cacheInfo.textContent = '';
  btn.disabled = true;
  btn.textContent = '⟳ Loading…';

  const feeds = FEEDS[cat] || FEEDS.top;
  let completed = 0;

  // Render loading placeholders immediately
  content.innerHTML = feeds.map(f =>
    `<div class="news-section" id="feed-${slug(f.name)}">
       <div class="source-header"><span class="source-title">${f.name}</span></div>
       <div class="loading-feed">Fetching…</div>
     </div>`
  ).join('');

  progress.style.width = '0%';

  // Fetch all feeds concurrently, render each as it arrives
  const promises = feeds.map(async (feed) => {
    const sectionId = `feed-${slug(feed.name)}`;
    try {
      const items = await fetchFeed(feed.url);
      completed++;
      progress.style.width = `${Math.round(completed/feeds.length*100)}%`;

      const section = document.getElementById(sectionId);
      if(!section) return;

      if(!items?.length) {
        section.querySelector('.loading-feed, .error-feed').outerHTML =
          `<div class="error-feed">No articles returned — feed may be down</div>`;
        return;
      }

      const shown = items.slice(0, feed.limit || 6);
      section.innerHTML = `
        <div class="source-header">
          <span class="source-title">${feed.name}</span>
          <span class="source-count">${shown.length} stories</span>
        </div>
        ${shown.map(renderArticle).join('')}
      `;
    } catch(e) {
      if(e.name==='AbortError') return;
      completed++;
      progress.style.width = `${Math.round(completed/feeds.length*100)}%`;
      const section = document.getElementById(sectionId);
      if(section) section.innerHTML = `
        <div class="source-header"><span class="source-title">${feed.name}</span></div>
        <div class="error-feed">⚠ Failed to load (${e.message||'network error'})</div>
      `;
    }
  });

  await Promise.allSettled(promises);

  progress.style.width = '100%';
  setTimeout(() => { progress.style.width = '0%'; }, 800);

  btn.disabled = false;
  btn.textContent = '↻ REFRESH';

  // Cache the rendered HTML
  cacheSet(cat, content.innerHTML);
  cacheInfo.textContent = `Loaded ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;

  // Update header timestamps
  const now = new Date();
  document.getElementById('current-date').textContent = fmtDate(now);
  document.getElementById('last-update').textContent  =
    `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
}

function slug(name) { return name.toLowerCase().replace(/[^a-z0-9]/g,'_'); }

/* ── Tab listeners ───────────────────────────────────────── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => loadCategory(tab.dataset.cat));
});

/* ── Boot ────────────────────────────────────────────────── */
const now = new Date();
document.getElementById('current-date').textContent = fmtDate(now);
loadCategory('top');
setInterval(() => loadCategory(currentCat), 10 * 60 * 1000);
</script>
</body>
</html>
