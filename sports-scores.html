<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240px, initial-scale=1.0">
    <title>Sports Scores</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; font-size: 12px; background: #000; color: #fff; padding: 5px; max-width: 240px; }
        .header { position: sticky; top: 0; background: #000; z-index: 100; padding-bottom: 2px; border-bottom: 1px solid #fff; }
        .back-btn { display: inline-block; padding: 2px 6px; margin: 2px 0; background: #222; color: #0ff; text-decoration: none; font-size: 10px; border-radius: 3px; }
        .back-btn:active { background: #333; }
        h1 { font-size: 14px; text-align: center; padding: 4px 0; margin: 0; }
        .sport-section { margin-bottom: 12px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .sport-title { font-size: 14px; font-weight: bold; color: #0ff; margin-bottom: 5px; padding: 3px 0; }
        .game { background: #111; margin: 4px 0; padding: 5px; border-left: 3px solid #0ff; text-decoration: none; display: block; color: inherit; }
        .game:active { background: #222; }
        .game-status { font-size: 10px; color: #888; margin-bottom: 2px; }
        .game-status.live { color: #f00; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .game-status.live::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #f00; border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
        .team-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; }
        .team-name { flex: 1; }
        .score { font-weight: bold; font-size: 13px; min-width: 25px; text-align: right; }
        .winner { color: #0f0; }
        .loading { text-align: center; padding: 20px; color: #888; }
        .error { text-align: center; padding: 10px; color: #f00; font-size: 11px; }
        .config-error { background: #300; color: #f88; padding: 6px; font-size: 10px; margin: 4px 0; border-left: 3px solid #f00; }
        .refresh-btn { display: block; width: 100%; padding: 5px; margin: 5px 0; background: #0ff; color: #000; border: none; font-weight: bold; font-size: 11px; cursor: pointer; }
        .last-update { text-align: center; font-size: 9px; color: #666; margin: 2px 0; }
    </style>
</head>
<body>
    <div class="header">
        <a href="home.html" class="back-btn">&lt;- Back</a>
        <h1>SPORTS SCORES</h1>
        <div class="last-update" id="currentDate"></div>
    </div>
    <button class="refresh-btn" onclick="loadScores()">REFRESH</button>
    <div class="last-update" id="lastUpdate"></div>
    <div id="content"><div class="loading">Loading config...</div></div>

    <script>
        var API_BASE       = 'https://site.api.espn.com/apis/site/v2/sports';
        var CONFIG_URL     = 'sports-config.json';
        var CACHE_KEY      = 'sports_scores_cache';
        var CACHE_DURATION = 2 * 60 * 1000;

        var PRIORITY_TEAMS = [];
        var SPORTS_CONFIG  = {};

        async function loadConfig() {
            var res = await fetch(CONFIG_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error('HTTP ' + res.status);
            var cfg = await res.json();
            PRIORITY_TEAMS = cfg.priority_teams || [];
            SPORTS_CONFIG  = {};
            (cfg.leagues || []).forEach(function(league) {
                if (league.enabled === false) return;
                SPORTS_CONFIG[league.name] = {
                    url:   API_BASE + '/' + league.espn_path + '/scoreboard',
                    color: league.color || '#0ff'
                };
            });
        }

        function formatTime(ts) {
            var d = new Date(ts), h = d.getHours(), m = d.getMinutes().toString().padStart(2,'0');
            return (h % 12 || 12) + ':' + m + (h >= 12 ? ' PM' : ' AM');
        }

        function formatDate(ts) {
            var date = new Date(ts), today = new Date(), yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return '';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getGameStatus(comp) {
            var s = comp.status, typeName = s.type.name, gameDate = formatDate(comp.date);
            if (typeName === 'STATUS_IN_PROGRESS')
                return '<span class="live">LIVE - ' + (s.type.shortDetail || '') + '</span>';
            if (typeName === 'STATUS_FINAL') {
                var f = s.type.shortDetail || 'FINAL';
                return gameDate ? f + ' - ' + gameDate : f;
            }
            if (typeName === 'STATUS_SCHEDULED') {
                var t = formatTime(comp.date);
                return gameDate ? gameDate + ' ' + t : t;
            }
            return s.type.shortDetail || 'Scheduled';
        }

        function isPriorityTeam(team) {
            var name = (team.team.abbreviation || team.team.shortDisplayName || team.team.displayName || '').toUpperCase();
            return PRIORITY_TEAMS.some(function(p) { return name.includes(p.toUpperCase()); });
        }

        function renderGame(comp, isPriority, showSport) {
            var home = comp.competitors.find(function(t) { return t.homeAway === 'home'; });
            var away = comp.competitors.find(function(t) { return t.homeAway === 'away'; });
            var isLive = comp.status.type.name === 'STATUS_IN_PROGRESS';
            var pStyle = isPriority ? 'border-left:3px solid #ffd700;background:#1a1a00;' : '';
            var pLabel = isPriority ? '<span style="color:#ffd700;font-weight:bold;">* </span>' : '';
            var sLabel = (showSport && comp._sportName) ? '<span style="color:#0ff;font-size:10px;">[' + comp._sportName + ']</span> ' : '';
            var link = '#';
            if (comp.links) {
                var gc = comp.links.find(function(l) { return l.text === 'Gamecast' || l.text === 'Game Info'; });
                link = gc ? gc.href : (comp.links[0] ? comp.links[0].href : '#');
            }
            var open  = link !== '#' ? '<a href="' + link + '" target="_blank" rel="noopener noreferrer" class="game" style="' + pStyle + '">' : '<div class="game" style="' + pStyle + '">';
            var close = link !== '#' ? '</a>' : '</div>';
            return open +
                '<div class="game-status ' + (isLive ? 'live' : '') + '">' + pLabel + sLabel + getGameStatus(comp) + '</div>' +
                '<div class="team-row"><span class="team-name ' + (away.winner ? 'winner' : '') + '">' + (away.team.abbreviation || away.team.shortDisplayName) + '</span><span class="score ' + (away.winner ? 'winner' : '') + '">' + (away.score || '-') + '</span></div>' +
                '<div class="team-row"><span class="team-name ' + (home.winner ? 'winner' : '') + '">' + (home.team.abbreviation || home.team.shortDisplayName) + '</span><span class="score ' + (home.winner ? 'winner' : '') + '">' + (home.score || '-') + '</span></div>' +
                close;
        }

        async function fetchSportScores(sportName, config) {
            try {
                var res = await fetch(config.url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json(), events = data.events || [];
                var priorityGames = [], regularGames = [];
                events.slice(0, 15).forEach(function(event) {
                    var comp = event.competitions[0];
                    comp._sportName = sportName;
                    if (comp.competitors.some(isPriorityTeam)) priorityGames.push(comp);
                    else regularGames.push(comp);
                });
                return { priorityGames: priorityGames, regularGames: regularGames.slice(0, 10), hasGames: events.length > 0, sportName: sportName, color: config.color };
            } catch(err) {
                return { priorityGames: [], regularGames: [], hasGames: false, sportName: sportName, color: config.color, error: true };
            }
        }

        function getCachedData() {
            try {
                var raw = localStorage.getItem(CACHE_KEY);
                if (raw) { var d = JSON.parse(raw); if (Date.now() - d.timestamp < CACHE_DURATION) return d.content; }
            } catch(e) {}
            return null;
        }

        function setCachedData(content) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ content: content, timestamp: Date.now() })); } catch(e) {}
        }

        async function loadScores(forceRefresh) {
            var content = document.getElementById('content');
            if (!forceRefresh) {
                var cached = getCachedData();
                if (cached) { content.innerHTML = cached; updateTimestamp(); loadScores(true); return; }
            }
            content.innerHTML = '<div class="loading">Loading scores...</div>';
            try {
                var results = await Promise.all(Object.entries(SPORTS_CONFIG).map(function(e) { return fetchSportScores(e[0], e[1]); }));
                var allPriority = [];
                results.forEach(function(r) { allPriority = allPriority.concat(r.priorityGames); });
                var html = '';
                if (allPriority.length > 0) {
                    html += '<div class="sport-section"><div class="sport-title" style="border-left:3px solid #ffd700;padding-left:5px;">FAVORITES</div>' + allPriority.map(function(c) { return renderGame(c, true, true); }).join('') + '</div>';
                }
                results.forEach(function(result) {
                    if (result.error) {
                        html += '<div class="sport-section"><div class="sport-title" style="border-left:3px solid ' + result.color + ';padding-left:5px;">' + result.sportName + '</div><div class="error">Unable to load</div></div>';
                    } else if (result.regularGames.length > 0) {
                        html += '<div class="sport-section"><div class="sport-title" style="border-left:3px solid ' + result.color + ';padding-left:5px;">' + result.sportName + '</div>' + result.regularGames.map(function(c) { return renderGame(c, false, false); }).join('') + '</div>';
                    } else if (!result.hasGames && allPriority.length === 0) {
                        html += '<div class="sport-section"><div class="sport-title" style="border-left:3px solid ' + result.color + ';padding-left:5px;">' + result.sportName + '</div><div style="padding:5px;color:#666;font-size:11px;">No games today</div></div>';
                    }
                });
                content.innerHTML = html;
                if (forceRefresh) setCachedData(html);
                updateTimestamp();
            } catch(err) {
                content.innerHTML = '<div class="error">Failed to load scores.</div>';
            }
        }

        function updateTimestamp() {
            var now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('lastUpdate').textContent = 'Updated: ' + now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === 'SoftRight') { var b = document.querySelector('.refresh-btn'); if (b) b.click(); }
            if (e.key === 'SoftLeft' || e.key === 'Backspace') window.location.href = 'home.html';
        });

        (async function() {
            try {
                await loadConfig();
            } catch(err) {
                document.getElementById('content').innerHTML = '<div class="config-error">Could not load sports-config.json: ' + err.message + '. Make sure the file is in the same directory.</div>';
                return;
            }
            loadScores();
            setInterval(function() { loadScores(true); }, 120000);
        })();
    </script>
</body>
</html>
