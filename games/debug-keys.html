<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Key Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:240px;height:320px;overflow:hidden;background:#0d1b2a;color:#fff;
  font-family:'Segoe UI',Arial,sans-serif;font-size:11px;touch-action:manipulation}
.shell{display:flex;flex-direction:column;width:240px;height:320px}
.hdr{background:#1a2f45;padding:6px 10px;font-size:13px;font-weight:bold;
  color:#00c8ff;border-bottom:1px solid #243b55;flex-shrink:0}
.tap{background:#ff6b35;color:#fff;border:none;width:100%;padding:8px;
  font-size:12px;font-weight:bold;cursor:pointer;flex-shrink:0}
.log{flex:1;overflow-y:auto;padding:6px}
.row{padding:3px 4px;border-bottom:1px solid #243b55;color:#8aafc8;font-size:10px;
  font-family:monospace}
.row .k{color:#00c8ff;font-weight:bold}
.row .code{color:#ff6b35}
.row .kc{color:#ffb300}
.none{color:#37474f;font-style:italic;padding:8px}
.skeys{background:#0a1628;border-top:1px solid #243b55;display:flex;height:26px;flex-shrink:0}
.sk{flex:1;background:none;border:none;color:#8aafc8;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.sk:active{background:#243b55}
#kc{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;
  pointer-events:none;border:none;outline:none;padding:0;background:none}
</style>
</head>
<body>
<button id="kc" tabindex="0" aria-hidden="true"></button>
<div class="shell">
  <div class="hdr">&#x1F3AE; Key Debugger</div>
  <button class="tap" onclick="focusKc()">TAP HERE FIRST, THEN PRESS KEYS</button>
  <div class="log" id="log">
    <div class="none">Press any key after tapping above...</div>
  </div>
  <div class="skeys">
    <button class="sk" onclick="document.getElementById('log').innerHTML='<div class=none>Cleared...</div>'">Clear</button>
    <button class="sk" id="status">● not focused</button>
    <button class="sk" onclick="focusKc()">Re-focus</button>
  </div>
</div>
<script>
var kc = document.getElementById('kc');
var log = document.getElementById('log');
var count = 0;

function focusKc() {
  kc.focus();
  document.getElementById('status').textContent = '● focused';
  document.getElementById('status').style.color = '#00c8ff';
}

kc.addEventListener('blur', function() {
  document.getElementById('status').textContent = '● lost focus';
  document.getElementById('status').style.color = '#ff6b35';
});

kc.addEventListener('focus', function() {
  document.getElementById('status').textContent = '● focused';
  document.getElementById('status').style.color = '#00c8ff';
});

function logKey(type, e) {
  // Clear placeholder
  var placeholder = log.querySelector('.none');
  if (placeholder) placeholder.remove();

  count++;
  var div = document.createElement('div');
  div.className = 'row';
  div.innerHTML =
    '<span style="color:#555">' + count + ' ' + type + '</span> ' +
    'key=<span class="k">' + JSON.stringify(e.key) + '</span> ' +
    'code=<span class="code">' + (e.code||'?') + '</span> ' +
    'kc=<span class="kc">' + e.keyCode + '</span>';
  log.insertBefore(div, log.firstChild);

  // Keep only last 15
  while (log.children.length > 15) log.removeChild(log.lastChild);
}

// Listen on BOTH kc and window to catch everything
kc.addEventListener('keydown',  function(e) { e.preventDefault(); logKey('kc↓', e); });
kc.addEventListener('keyup',    function(e) { e.preventDefault(); logKey('kc↑', e); });

window.addEventListener('keydown', function(e) {
  e.preventDefault(); e.stopImmediatePropagation();
  logKey('win↓', e);
}, {capture: true, passive: false});

// Also log touch events to confirm tap is working
document.querySelector('.tap').addEventListener('touchend', function() {
  focusKc();
  var div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = '<span style="color:#81c784">TAP detected — button focused</span>';
  log.insertBefore(div, log.firstChild);
  var placeholder = log.querySelector('.none');
  if (placeholder) placeholder.remove();
});
</script>
</body>
</html>
