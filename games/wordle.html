<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no">
  <title>Wordle | Josh</title>
  <style>

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    /* ── KaiOS key capture input ────────────────────────
       position:fixed at 0,0 with size 0 — invisible but
       always focused so KaiOS treats this page as an app  */
    #key-capture {
      position: fixed;
      top: 0; left: 0;
      width: 1px; height: 1px;
      opacity: 0;
      border: none; outline: none;
      background: transparent;
      color: transparent;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Shell scrolls internally; page never scrolls ── */
    html, body { height: 100%; overflow: hidden; }
    .shell {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 340px;
      margin: 0 auto;
      padding: 6px 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Compact nav ────────────────────────────────────*/
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    .nav-home {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
      padding: 3px 7px;
      background: var(--accent-lo);
      border: 1px solid var(--accent-hi);
      border-radius: var(--radius);
      white-space: nowrap;
    }
    .nav-title {
      flex: 1;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-menu-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 15px;
      padding: 2px 7px;
      border-radius: var(--radius);
      cursor: pointer;
      line-height: 1.4;
    }
    .nav-links {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .nav-links.open { display: flex; }
    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .nav-links a.cur { color: var(--accent); border-color: var(--accent-hi); }

    /* ── Score boxes ────────────────────────────────────*/
    .score-bar { display: flex; gap: 5px; flex-shrink: 0; }
    .score-box {
      flex: 1;
      background: var(--accent-lo);
      border: 1px solid var(--surface2);
      border-top: 2px solid var(--accent);
      border-radius: var(--radius);
      text-align: center;
      padding: 4px 2px 3px;
    }
    .score-box .label {
      font-size: 9px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .score-box .val {
      font-size: 15px; color: var(--accent);
      font-weight: bold; line-height: 1.2;
    }

    /* ── Buttons ────────────────────────────────────────*/
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      padding: 5px 9px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .btn:active { color: var(--accent); border-color: var(--accent-hi); }

    /* ── Controls row ───────────────────────────────────*/
    .controls {
      display: flex; gap: 5px;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── D-pad ──────────────────────────────────────────*/
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows:    repeat(3, 40px);
      gap: 3px;
      margin: 0 auto;
      width: fit-content;
      flex-shrink: 0;
    }
    .dpad .btn {
      width: 40px; height: 40px;
      padding: 0; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .dpad .btn-sm { font-size: 10px; line-height: 1.2; text-align: center; }

    .hint {
      font-size: 10px; color: var(--text-dim);
      text-align: center; flex-shrink: 0;
    }

    /* ── Leaderboard ────────────────────────────────────*/
    .lb-wrap { border-top: 1px solid var(--border); padding-top: 5px; flex-shrink: 0; }
    .lb-hdr {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .lb-status { font-size: 9px; }
    .lb-status.ok  { color: var(--accent-hi); }
    .lb-status.err { color: #a05030; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { color: var(--text-dim); font-weight: normal; text-align: left;
         padding: 1px 3px; border-bottom: 1px solid var(--border); }
    td { padding: 2px 3px; color: var(--text);
         border-bottom: 1px solid var(--surface2); }
    tr:first-child td { color: var(--accent); }
    td.r { color: var(--text-dim); width: 18px; }
    td.sv { text-align: right; color: var(--accent); }
    td.dv { text-align: right; color: var(--text-dim); font-size: 10px; }


    :root {
      --bg:#fff; --surface:#f6f7f8; --surface2:#edeff1; --border:#edeff1;
      --accent:#ff4500; --accent-hi:#ff6314; --accent-lo:#fff3ef;
      --text:#1c1c1c; --text-dim:#878a8c; --radius:4px;
      --tc:#ff4500; --tp:#ffb300; --ta:#787c7e;
    }
    /* Wordle shell can scroll (keyboard takes up space) */
    .shell { overflow-y: auto; }
    .meta-bar{
      display:flex;justify-content:space-between;align-items:center;
      font-size:10px;color:var(--text-dim);background:var(--accent-lo);
      border:1px solid var(--surface2);border-left:3px solid var(--accent);
      border-radius:var(--radius);padding:4px 7px;flex-shrink:0;
    }
    .meta-bar strong{color:var(--accent);}
    .toast{
      position:fixed;top:50px;left:50%;transform:translateX(-50%);
      background:var(--text);color:#fff;font-size:12px;font-weight:bold;
      padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .2s;
      z-index:20;pointer-events:none;white-space:nowrap;
    }
    .toast.show{opacity:1;}
    .grid-wrap{display:flex;justify-content:center;padding:4px 0;flex-shrink:0;}
    #grid{
      display:grid;grid-template-rows:repeat(6,1fr);
      grid-template-columns:repeat(5,1fr);gap:5px;
      width:min(260px,82vw);
    }
    .tile{
      aspect-ratio:1;display:flex;align-items:center;justify-content:center;
      font-size:clamp(16px,6vw,22px);font-weight:900;
      border:2px solid #d3d6da;background:#fff;color:var(--text);
      text-transform:uppercase;border-radius:2px;
    }
    .tile.filled{border-color:#999;animation:pop .1s ease;}
    .tile.correct{background:var(--tc);border-color:var(--tc);color:#fff;}
    .tile.present{background:var(--tp);border-color:var(--tp);color:#fff;}
    .tile.absent {background:var(--ta);border-color:var(--ta);color:#fff;}
    .tile.shake  {animation:shake .4s ease;}
    @keyframes pop  {0%{transform:scale(1.1)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .keyboard{display:flex;flex-direction:column;gap:5px;padding:0 2px;flex-shrink:0;}
    .kb-row{display:flex;gap:4px;justify-content:center;}
    .key{
      height:38px;min-width:26px;flex:1;max-width:32px;
      background:#edeff1;border:none;border-radius:3px;
      font-size:12px;font-weight:700;color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      text-transform:uppercase;-webkit-tap-highlight-color:transparent;
    }
    .key.wide{max-width:46px;font-size:10px;}
    .key:active{filter:brightness(.9);}
    .key.correct{background:var(--tc);color:#fff;}
    .key.present{background:var(--tp);color:#fff;}
    .key.absent {background:#c0c2c4;color:#fff;}
    .result-bar{
      background:var(--accent-lo);border:1px solid var(--surface2);
      border-left:3px solid var(--accent);border-radius:var(--radius);
      padding:8px 10px;font-size:12px;display:none;flex-shrink:0;
    }
    .result-bar.show{display:block;}
    .result-bar strong{color:var(--accent);font-size:14px;}
    .result-bar .sub{color:var(--text-dim);font-size:11px;margin-top:2px;}
    .result-bar .share{margin-top:6px;display:flex;gap:5px;}
    .result-bar .share .btn{flex:1;}

  </style>
</head>

    <div class="lb-hdr"><span>Win History</span><span class="lb-status" id="lb-status">local</span></div>
    <table><thead><tr><th>#</th><th>Word</th><th>Guesses</th><th>Date</th></tr></thead>
    <tbody id="lb-body"></tbody></table>
  </div>
</div>

<script>

/* ── Word list — 500 common 5-letter words ─────────────────── */
const WORDS = `about above abuse actor acute admin admit adobe adopt after again agent agile agree ahead aisle alarm album alert alien align alike alive allay alley allot allow alone along aloof aloud alpha altar alter among ample angel anger angle angry anime annex annoy antic anvil aorta apart aphid apple apply apron aptly arena argue arise armor aroma arose array aside asset atlas atone attic audit augur avail avant avert avian avoid avid award aware awful badly baker basic basis beach beard beast beaut began begin being below bench berry bevel bidet biker birch bison black blade blame bland blast blaze bleed blend bless blind blink bliss bloat block blood bloom blown blues blunt blurt blush board bonus boost booth bored bound brain brake brand brave brawl break breed breve brick bride brief brine bring brink broil broke brook broth brows brunt brush build built bulge bumpy burst buyer bylaw cabal cadet camel cameo canal candy cargo carry cause cease cedar chain chair chaos charm chart chase cheap cheat check cheek cheer chess chest chief china choir chord chunk civic civil clack claim clamp clang clank clash clasp clean clear click cliff climb cling clock clone close cloth cloud clout clown clunk coact coach coapt coeur coils color comic comma count court cover crack craft crane crash crave craze creak creek creep crest crimp crisp cross crowd crown crude cruel crumb cruse crush crypt cubic curve cycle daddy dairy dance dandy dealt debug decay decor decoy delve dense depot depth derby deter devil digit dimly dirty disco discs dodge dogma doing dopey doubt dough dowry drank drawl dream dried drift drink drool droop drove drown druid drums dryer duchy dulls dummy dunce duped dusty dwarf dwell dying eager eagle early earth eight elect elite ember emote empty enjoy envoy equip ethic evade event every exert exile exist extra fable facet faint fairy faith fancy farce fatal fault favor feast ferry fetch fever field fiend fight filth final fixed fizzy fjord flaky flame flank flare flash flask flawy flaw flesh flick fling flock flood flora floss flout flown fluke flunk flute focus folio folly forge forth forum found foyer frail frame freak fresh friar front frost froth froze fully fungi funky funny futon fuzzy gaudy gaunt gauze gavel gawky gimmick girth given glare gleam glean glide glint gloat gloom gloss glove glyph gnash godly goose grace grade graft grain grasp graze greet grief grill grimy gripe grit groan groin groom grope gross group grove growl gruel gruff grump guava guile guise gusto gypsy hairy handy hatch haunt haves hazel heady heart heavy hedge helix hence heron hippo hired hoist holly homer honey honor horde hotel hound hover humid hurry hyena hydra icily icing ideal idiom idiot inept infer ingot inlay input inter intro irony issue ivory jaunt jazzy jelly joust joker jumbo kaput kayak kinky knife knoll knot kudos label lance lanky lapel large laser latch later latte lathe layer leach leaky leapt leech leery legal lemma lemon level liege liken limbo lingo lipid liter liver livid local lofty logic loose lousy lover lowly lumpy lusty lying lyric magic maker mania manly maple march marry masse match matte maxim media medic melee mercy merge messy metal midst might mimic mirth miser mixed model money month moody morph mossy motel motor motto moult mound mourn muddy muggy munch murky myrrh nadir naive nasty needy nerve newly night noble noise nomad north notch novel nudge nymph occur ocean offal often olive optic orbit order other ought outdo outer oxide oxide ozone padre panic papal paper party pasta pasty patch patio patsy pause peace pearl pedal penal petty phase piano pithy pixel pixel pizza pixel place plaid plain plane plank plant plaza plaza plead pleat plied plumb plume plunk plush poach podgy point poker polar polka poppy porch posse pouch pouty power prawn press price pride prime primp print prism prize probe prone proof prose prove prowl psalm pudgy pulse punch purge quack quaff quake qualm quark quart quasi quill quilt quirk quota quota quota quote quota rabbi radar radii rainy rally ranch rangy rapid raven raspy reach realm rebus rebel recap reedy regal reign relay realm remit repay repel repot rerun reset resin retro revel rhyme rider rigid risky rivet robot rocky rogue rondo roomy roped rosin rouge rough rouse rowdy ruder rugby ruler rumba rusty sadly saint savvy scald scalp scoff scold scone scoop scorn scout scowl scram screw scrub seize shack shaft shaky shale shall shalt shame shank share shark shawl sheen shelf shell shift shire shirt shoal shook shore shout shovel shred shrub shrug shunt siege sigma silly since sixth sixty skiff skimp skull slab slack slant slurp smack small smash smear smirk smite smock snaky snare sneak sneer snide sniff snore solar sonar sorry south sower spark spawn spear speck spend spire splat split spoil spoke spoof sport spout spree sprig spunk squad squat squid stain stale stalk stall stamp stark stash stave stead steer stern stick stiff still sting stink stoic stomp stone stout stove strap stray strew strip strut study stump stung style suave suede suite sulky sunny super surge swamp swank swarm swear sweat sweep swept swift swirl taint tangy taunt tawny tease terse their thorn three threw throb throw tiger timid titan toadal token tonic topaz total touch touchy towel toxic track trait tramp trend tribe trice trick tried tripe troll troth trout trove truce trump trunk tryst tulip tumor tuned tunic twang tweak twirl twist tying tying udder ultra uncut unfit unify unity until unwed upset urban usher usual utter uvula vague vapor vault vaunt vegan vigor vigor vigil viral vital vivid vocal vodka voila voila vouch vying waltz waver weary wedge weedy weigh weird whack whale whiff while whiff whirl whisk which witty witty women world wordy wrath wring wrote yacht yearn yield young zeal zilch zippy zoned`.split(/\s+/).filter(w=>w.length===5);

/* ── Date-based seed ──────────────────── */
const EPOCH = new Date('2025-01-01').getTime();
function todayIndex() {
  const now = new Date();
  const utc = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((utc - EPOCH) / 86400000) % WORDS.length;
}
function todayStr() {
  const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

/* ── State ────────────────────────────── */
const REPO       = 'DiomedesAuRaa/Portfolio';
const SCORES_URL = `https://raw.githubusercontent.com/${REPO}/main/games/scores-wordle.json`;
const LS_SCORES  = 'games_wordle_scores';
const LS_STATE   = 'games_wordle_state';
const TOP_N      = 30;
const MAX_GUESSES = 6;
const WORD_LEN    = 5;
const KB_ROWS = ['qwertyuiop','asdfghjkl','⌫zxcvbnm↵'];

let answer, guesses, currentGuess, gameOver, practiceMode;
let keyState = {}; // letter -> 'correct'|'present'|'absent'

/* ── Load / init ──────────────────────── */
function loadTodayState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_STATE)||'null');
    if(s && s.date === todayStr() && !s.practiceMode) {
      answer       = WORDS[todayIndex()].toLowerCase();
      guesses      = s.guesses || [];
      currentGuess = '';
      gameOver     = s.gameOver || false;
      keyState     = s.keyState || {};
      return true;
    }
  } catch{}
  return false;
}

function initGame(practice=false) {
  practiceMode = practice;
  if(practice) {
    // random word, not today's
    answer = WORDS[Math.floor(Math.random()*WORDS.length)].toLowerCase();
  } else {
    answer = WORDS[todayIndex()].toLowerCase();
  }
  guesses      = [];
  currentGuess = '';
  gameOver     = false;
  keyState     = {};
  saveState();
}

function saveState() {
  if(practiceMode) return;
  localStorage.setItem(LS_STATE, JSON.stringify({
    date: todayStr(), guesses, gameOver, keyState, practiceMode:false
  }));
}

/* ── Render ───────────────────────────── */
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  for(let r=0;r<MAX_GUESSES;r++) for(let c=0;c<WORD_LEN;c++) {
    const t=document.createElement('div');
    t.className='tile'; t.id=`t${r}${c}`;
    grid.appendChild(t);
  }
}

function buildKeyboard() {
  KB_ROWS.forEach((row,ri)=>{
    const el=document.getElementById(`row${ri}`);
    el.innerHTML='';
    [...row].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k==='⌫'||k==='↵'?' wide':'');
      btn.textContent=k; btn.dataset.key=k;
      btn.addEventListener('click',()=>handleKey(k));
      el.appendChild(btn);
    });
  });
}

function renderGuesses() {
  // fill completed rows
  guesses.forEach((guess,r)=>{
    const result=evalGuess(guess);
    for(let c=0;c<WORD_LEN;c++){
      const t=document.getElementById(`t${r}${c}`);
      t.textContent=guess[c].toUpperCase();
      t.className='tile '+result[c];
    }
  });

  // current in-progress row
  if(!gameOver && guesses.length<MAX_GUESSES){
    const r=guesses.length;
    for(let c=0;c<WORD_LEN;c++){
      const t=document.getElementById(`t${r}${c}`);
      t.textContent=currentGuess[c]?currentGuess[c].toUpperCase():'';
      t.className='tile'+(currentGuess[c]?' filled':'');
    }
  }

  renderKeyboard();
}

function renderKeyboard() {
  document.querySelectorAll('.key').forEach(btn=>{
    const k=btn.dataset.key;
    if(keyState[k]) btn.className='key'+(/[⌫↵]/.test(k)?' wide':'')+' '+keyState[k];
    else btn.className='key'+(/[⌫↵]/.test(k)?' wide':'');
  });
}

/* ── Guess evaluation ─────────────────── */
function evalGuess(guess) {
  const result=Array(WORD_LEN).fill('absent');
  const ansArr=[...answer], guessArr=[...guess];
  const used=Array(WORD_LEN).fill(false);

  // correct first
  for(let i=0;i<WORD_LEN;i++) {
    if(guessArr[i]===ansArr[i]) { result[i]='correct'; used[i]=true; }
  }
  // present
  for(let i=0;i<WORD_LEN;i++) {
    if(result[i]==='correct') continue;
    for(let j=0;j<WORD_LEN;j++) {
      if(!used[j]&&guessArr[i]===ansArr[j]) { result[i]='present'; used[j]=true; break; }
    }
  }
  return result;
}

function updateKeyState(guess, result) {
  const priority={correct:3,present:2,absent:1};
  guess.split('').forEach((l,i)=>{
    const cur=keyState[l];
    if(!cur||(priority[result[i]]>priority[cur])) keyState[l]=result[i];
  });
}

/* ── Input ────────────────────────────── */
function handleKey(k) {
  if(gameOver) return;
  if(k==='⌫'||k==='Backspace') {
    currentGuess=currentGuess.slice(0,-1);
    renderGuesses(); return;
  }
  if(k==='↵'||k==='Enter') { submitGuess(); return; }
  if(/^[a-z]$/i.test(k) && currentGuess.length<WORD_LEN) {
    currentGuess+=k.toLowerCase();
    renderGuesses();
  }
}

function submitGuess() {
  if(currentGuess.length<WORD_LEN){ shakeCurrent(); toast('Not enough letters'); return; }
  if(!WORDS.includes(currentGuess)){ shakeCurrent(); toast('Not in word list'); return; }

  const result=evalGuess(currentGuess);
  const row=guesses.length;
  guesses.push(currentGuess);
  updateKeyState(currentGuess, result);
  currentGuess='';

  // animate flip
  for(let c=0;c<WORD_LEN;c++){
    const t=document.getElementById(`t${row}${c}`);
    t.style.animationDelay=`${c*80}ms`;
    t.className='tile flip';
    setTimeout(()=>{ t.className='tile '+result[c]; t.style.animationDelay=''; }, c*80+250);
  }

  const won=result.every(r=>r==='correct');
  setTimeout(()=>{
    if(won) {
      gameOver=true;
      const msgs=['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
      toast(msgs[guesses.length-1]||'Yes!');
      bounceRow(row);
      setTimeout(()=>showResult(true),600);
      saveScore(guesses.length);
    } else if(guesses.length>=MAX_GUESSES) {
      gameOver=true;
      setTimeout(()=>showResult(false),400);
    }
    saveState();
    renderGuesses();
  }, WORD_LEN*80+300);
}

function shakeCurrent() {
  const r=guesses.length;
  for(let c=0;c<WORD_LEN;c++) {
    const t=document.getElementById(`t${r}${c}`);
    t.classList.remove('shake');
    void t.offsetWidth;
    t.classList.add('shake');
  }
}

function bounceRow(r) {
  for(let c=0;c<WORD_LEN;c++){
    setTimeout(()=>{
      const t=document.getElementById(`t${r}${c}`);
      t.classList.add('bounce');
    },c*60);
  }
}

/* ── End state ────────────────────────── */
function showResult(won) {
  const bar=document.getElementById('result-bar');
  bar.classList.add('show');
  document.getElementById('result-title').textContent = won
    ? `✓ Solved in ${guesses.length}/${MAX_GUESSES}`
    : `✗ The word was: ${answer.toUpperCase()}`;
  document.getElementById('result-answer').textContent = won
    ? `Word: ${answer.toUpperCase()} · ${practiceMode?'Practice':'Daily #'+todayIndex()}`
    : `Better luck tomorrow!`;
}

function copyShare() {
  const colors={correct:'🟧',present:'🟨',absent:'⬜'};
  const header=`Wordle #${todayIndex()} ${guesses.length}/${MAX_GUESSES}\n`;
  const rows=guesses.map(g=>evalGuess(g).map(r=>colors[r]).join('')).join('\n');
  navigator.clipboard.writeText(header+rows).then(()=>toast('Copied!'));
}

function resetForDemo() {
  document.getElementById('result-bar').classList.remove('show');
  initGame(true);
  buildGrid();
  renderGuesses();
}

/* ── Meta bar ─────────────────────────── */
function updateMeta() {
  const idx=todayIndex();
  document.getElementById('puzzle-num').textContent=`#${idx}`;
  const n=new Date();
  document.getElementById('meta-date').textContent=
    n.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const scores=getLocalScores();
  document.getElementById('wins').textContent=scores.filter(s=>s.won).length;
  // streak
  let streak=0, d=new Date();
  for(let i=0;i<60;i++){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(scores.some(s=>s.date===ds&&s.won)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('streak').textContent=streak;
}

/* ── Toast ────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1500);
}

/* ── Scores ───────────────────────────── */
function getLocalScores(){ try{return JSON.parse(localStorage.getItem(LS_SCORES)||'[]');}catch{return[];} }
function saveScore(numGuesses) {
  if(practiceMode) return;
  const scores=getLocalScores();
  // don't double-save same date
  if(scores.some(s=>s.date===todayStr())) return;
  scores.unshift({date:todayStr(),word:answer,guesses:numGuesses,won:true,puzzle:todayIndex()});
  localStorage.setItem(LS_SCORES,JSON.stringify(scores.slice(0,TOP_N)));
  updateMeta();
}

/* ── Leaderboard ──────────────────────── */
let lbVisible=false;
function toggleLB(){
  lbVisible=!lbVisible;
  document.getElementById('lb-section').style.display=lbVisible?'':'none';
  if(lbVisible) renderTable(getLocalScores(),document.getElementById('lb-body'));
}
function renderTable(scores,tbody){
  tbody.innerHTML=scores.map((s,i)=>`<tr>
    <td class="rank">${i+1}</td>
    <td class="score-val">${(s.word||'—').toUpperCase()}</td>
    <td>${s.guesses||'—'}/6</td>
    <td class="date-val">${s.date||'—'}</td>
  </tr>`).join('');
  if(!scores.length)tbody.innerHTML='<tr><td colspan="4" style="color:var(--text-dim);padding:4px 3px">no wins yet</td></tr>';
}

/* ── Physical keyboard ────────────────── */
/* keyboard via gameKey() */

/* ── Boot ─────────────────────────────── */
window.addEventListener('load',()=>{
  buildGrid();
  buildKeyboard();
  refocusCapture();

  if(!loadTodayState()) {
    initGame(false);
  }

  // restore from saved state
  guesses.forEach((guess,r)=>{
    const result=evalGuess(guess);
    for(let c=0;c<WORD_LEN;c++){
      const t=document.getElementById(`t${r}${c}`);
      t.textContent=guess[c].toUpperCase();
      t.className='tile '+result[c];
    }
  });

  renderKeyboard();
  updateMeta();

  if(gameOver) {
    const won=guesses.length>0&&evalGuess(guesses[guesses.length-1]).every(r=>r==='correct');
    showResult(won);
  }
});







function gameKey(key) {
  if(key==='Enter')     { handleKey('↵'); return; }
  if(key==='Backspace') { handleKey('⌫'); return; }
  if(/^[a-zA-Z]$/.test(key)) handleKey(key.toLowerCase());
}

var _lbOpen=false;
function lbToggle(){
  _lbOpen=!_lbOpen;
  document.getElementById('lb-wrap').style.display=_lbOpen?'':'none';
  if(_lbOpen) renderTable(getLocalScores(),document.getElementById('lb-body'));
}
function renderTable(scores,tbody){
  tbody.innerHTML=scores.map(function(s,i){
    return '<tr><td class="r">'+(i+1)+'</td><td class="sv">'+((s.word||'—').toUpperCase())+'</td><td>'+(s.guesses||'—')+'/6</td><td class="dv">'+(s.date||'—')+'</td></tr>';
  }).join('');
  if(!scores.length) tbody.innerHTML='<tr><td colspan="4" style="color:var(--text-dim);padding:4px">no wins yet</td></tr>';
}

/* ── KaiOS key capture ──────────────────────────────────
   Hidden <input> stays focused — KaiOS gives inputs full
   keyboard ownership so spatial nav cannot intercept.    */
var _keyCapture = document.getElementById('key-capture');

function refocusCapture() {
  if(_keyCapture && document.activeElement !== _keyCapture) {
    _keyCapture.focus();
  }
}

window.addEventListener('keydown', function(e) {
  var blocked = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter','Backspace'];
  if(blocked.indexOf(e.key) !== -1) {
    e.preventDefault();
    e.stopImmediatePropagation();
    if(typeof gameKey === 'function') gameKey(e.key);
  }
}, {capture: true, passive: false});

_keyCapture.addEventListener('keydown', function(e) {
  var blocked = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter','Backspace'];
  if(blocked.indexOf(e.key) !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
  if(typeof gameKey === 'function') gameKey(e.key);
});

document.addEventListener('click',    function(){ refocusCapture(); });
document.addEventListener('touchend', function(){ refocusCapture(); });

function toggleNav() {
  var nl = document.getElementById('nav-links');
  if(nl) nl.classList.toggle('open');
  refocusCapture();
}

function lbFetch(scoresUrl, lsKey, topN, sortFn) {
  var status = document.getElementById('lb-status');
  var tbody  = document.getElementById('lb-body');
  if(!status||!tbody) return;
  status.textContent = 'syncing…'; status.className = 'lb-status';
  var local = lbLocalScores(lsKey);
  lbRender(local, tbody);
  fetch(scoresUrl+'?_='+Date.now(),{cache:'no-store'})
    .then(function(r){ return r.ok?r.json():Promise.reject(); })
    .then(function(remote){
      var merged = remote.concat(local);
      merged.sort(sortFn);
      var seen = {}, deduped = [];
      merged.forEach(function(e){
        var k = JSON.stringify(e);
        if(!seen[k]){seen[k]=1;deduped.push(e);}
      });
      lbRender(deduped.slice(0,topN), tbody);
      status.textContent = '✓ git'; status.className = 'lb-status ok';
    })
    .catch(function(){
      status.textContent = '✓ local'; status.className = 'lb-status err';
    });
}
function lbLocalScores(key) {
  try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch{ return []; }
}
function lbSave(key, entry, topN, sortFn) {
  var scores = lbLocalScores(key);
  scores.push(entry);
  scores.sort(sortFn);
  localStorage.setItem(key, JSON.stringify(scores.slice(0,topN)));
}

window.addEventListener('load', function(){ refocusCapture(); });

</script>
