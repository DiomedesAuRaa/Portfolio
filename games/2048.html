<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>2048</title>
  <style>

    :root {
      --bg:#0d1b2a; --bg2:#1a2f45; --bg3:#243b55;
      --accent:#00c8ff; --accent2:#ff6b35;
      --text:#fff; --text-dim:#8aafc8;
      --softkey-bg:#0a1628;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:240px;max-width:240px;height:320px;max-height:320px;
      overflow:hidden;background:var(--bg);color:var(--text);
      font-family:'Segoe UI',Arial,sans-serif;font-size:12px;
      user-select:none;-webkit-user-select:none;touch-action:manipulation;
    }
    .shell{display:flex;flex-direction:column;width:240px;height:320px;overflow:hidden;position:relative}
    .game-header{
      background:var(--bg2);padding:4px 8px 3px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--bg3);flex-shrink:0;height:30px;
    }
    .game-title{font-size:13px;font-weight:bold;color:var(--accent);letter-spacing:1px}
    .score-strip{display:flex;gap:8px;align-items:center}
    .score-item{text-align:center}
    .score-item .sl{font-size:8px;color:var(--text-dim);text-transform:uppercase;display:block}
    .score-item .sv{font-size:12px;font-weight:bold;color:#fff}
    .score-item .sv.hi{color:var(--accent)}
    .game-area{
      flex:1;display:flex;align-items:center;justify-content:center;
      background:var(--bg);overflow:hidden;position:relative;
    }
    #tap-banner{
      position:absolute;inset:0;background:rgba(13,27,42,0.88);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:5px;z-index:10;cursor:pointer;
    }
    #tap-banner .tb-icon{font-size:26px}
    #tap-banner .tb-text{font-size:11px;font-weight:bold;color:var(--accent)}
    #tap-banner .tb-sub{font-size:9px;color:var(--text-dim)}
    .overlay{
      position:absolute;inset:0;background:rgba(13,27,42,0.93);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;z-index:8;
    }
    .overlay.show{display:flex}
    .overlay h2{font-size:18px;font-weight:bold;color:var(--accent)}
    .overlay p{font-size:11px;color:var(--text-dim);text-align:center;line-height:1.5}
    .ov-btn{
      background:var(--accent2);color:#fff;border:none;
      padding:6px 20px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;
    }
    .softkeys{
      background:var(--softkey-bg);border-top:1px solid var(--bg3);
      display:flex;align-items:center;height:26px;flex-shrink:0;
    }
    .sk{
      flex:1;height:100%;background:none;border:none;color:var(--text);
      font-size:11px;font-weight:bold;cursor:pointer;padding:0 4px;
      display:flex;align-items:center;justify-content:center;
    }
    .sk:active{background:var(--bg3)}
    .sk.left{justify-content:flex-start;color:var(--accent)}
    .sk.right{justify-content:flex-end;color:var(--accent)}
    .sk.mid{font-size:11px;color:#fff}
    .nav-drawer{
      position:absolute;top:0;left:0;right:0;background:var(--bg2);
      border-bottom:2px solid var(--accent);z-index:20;
      transform:translateY(-100%);transition:transform 0.15s ease;
    }
    .nav-drawer.open{transform:translateY(0)}
    .nav-drawer a{
      display:block;padding:7px 10px;color:var(--text-dim);
      text-decoration:none;font-size:12px;border-bottom:1px solid var(--bg3);
    }
    .nav-drawer a.cur{color:var(--accent);font-weight:bold}
    .nav-close{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--bg3)}
    .nav-close span{font-size:11px;color:var(--text-dim)}
    .nav-close button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer}
    #key-capture{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;border:none;outline:none}

    #board{display:grid;grid-template-columns:repeat(4,53px);grid-template-rows:repeat(4,53px);
      gap:5px;background:var(--bg2);padding:5px;border-radius:10px;}
    .tile{width:53px;height:53px;border-radius:8px;display:flex;align-items:center;
      justify-content:center;font-weight:900;font-size:18px;background:var(--bg3);color:#fff;}
    .tile[data-v]{animation:tpop .1s ease-out}
    @keyframes tpop{0%{transform:scale(1.12)}100%{transform:scale(1)}}
    .tile[data-v="2"]{background:#6b4fa0}.tile[data-v="4"]{background:#d4601a}
    .tile[data-v="8"]{background:#cc2222}.tile[data-v="16"]{background:#c87820}
    .tile[data-v="32"]{background:#d4892a}.tile[data-v="64"]{background:#e04040}
    .tile[data-v="128"]{background:#9b2fa0;font-size:13px}
    .tile[data-v="256"]{background:#1a7acc;font-size:13px}
    .tile[data-v="512"]{background:#0fa06e;font-size:13px}
    .tile[data-v="1024"]{background:#e0a020;font-size:10px}
    .tile[data-v="2048"]{background:#ff6b35;font-size:10px;box-shadow:0 0 10px #ff6b35}
    
  </style>
</head>
<body>
<input id="key-capture" type="text" inputmode="none" autocomplete="off">
<div class="shell">
  <div class="nav-drawer" id="nav-drawer">
    <div class="nav-close"><span>NAVIGATE</span><button onclick="toggleNav()">&#x2715;</button></div>
    <a href="../home.html">&#x2190; Home</a>
    <a href="2048.html" class="cur">2048</a>
    <a href="snake.html">Snake</a>
    <a href="minesweeper.html">Minesweeper</a>
    <a href="tetris.html">Tetris</a>
    <a href="wordle.html">Wordle</a>
  </div>
  <div class="game-header">
    <span class="game-title">2048</span>
    <div class="score-strip">
      <div class="score-item"><span class="sl">Score</span><span class="sv" id="score">0</span></div>
      <div class="score-item"><span class="sl">Best</span><span class="sv hi" id="best">0</span></div>
    </div>
  </div>
  <div class="game-area" onclick="activateKeys()">
    <div class="overlay" id="overlay">
      <h2 id="ov-title">2048</h2><p id="ov-msg">Merge tiles to reach 2048</p>
      <button class="ov-btn" onclick="newGame()">NEW GAME</button>
    </div>
    <div id="board"></div>
    <div id="tap-banner" onclick="activateKeys()">
      <div class="tb-icon">&#x25BA;</div>
      <div class="tb-text">TAP TO ACTIVATE KEYS</div>
      <div class="tb-sub">then use arrow keys</div>
    </div>
  </div>
  <div class="softkeys">
    <button class="sk left" onclick="newGame()">New</button>
    <button class="sk mid" id="sk-mid">0 moves</button>
    <button class="sk right" onclick="toggleNav()">Menu</button>
  </div>
</div>
<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — update REPO to your GitHub user/repo
   Scores are read from scores.json in your repo root.
   To write back: commit scores.json via GitHub Actions or manually.
═══════════════════════════════════════════════════════════════ */
const REPO       = 'DiomedesAuRaa/Portfolio';
const SCORES_URL = `https://raw.githubusercontent.com/${REPO}/main/games/scores-2048.json`;
const LS_SCORES  = 'games_2048_scores';
const LS_STATE   = 'games_2048_state';
const LS_UNDO    = 'games_2048_undo';
const TOP_N      = 10;

/* ─── Game State ─────────────────────────────────────────────── */
let grid, score, moves, prevGrid, prevScore, prevMoves, won;

function emptyGrid() { return Array.from({length:4}, ()=>Array(4).fill(0)); }

function newGame() {
  activateKeys();
  grid = emptyGrid();
  score = 0; moves = 0; won = false;
  prevGrid = null; prevScore = 0; prevMoves = 0;
  addRandom(); addRandom();
  closeOverlay();
  refocusCapture();
  render();
  saveState();
}

function addRandom() {
  const empties = [];
  grid.forEach((row,r) => row.forEach((v,c) => { if(!v) empties.push([r,c]); }));
  if(!empties.length) return;
  const [r,c] = empties[Math.floor(Math.random()*empties.length)];
  grid[r][c] = Math.random()<0.9 ? 2 : 4;
}

/* ─── Movement ───────────────────────────────────────────────── */
function slide(row) {
  let r = row.filter(v=>v);
  let gained = 0;
  for(let i=0; i<r.length-1; i++) {
    if(r[i]===r[i+1]) { r[i]*=2; gained+=r[i]; r.splice(i+1,1); }
  }
  while(r.length<4) r.push(0);
  return [r, gained];
}

function move(dir) {
  const before = JSON.stringify(grid);
  prevGrid  = JSON.parse(JSON.stringify(grid));
  prevScore = score; prevMoves = moves;

  let gained = 0;
  if(dir==='left')  { grid.forEach((row,i)=>{ const[r,g]=slide(row); grid[i]=r; gained+=g; }); }
  if(dir==='right') { grid.forEach((row,i)=>{ const[r,g]=slide([...row].reverse()); grid[i]=r.reverse(); gained+=g; }); }
  if(dir==='up')    { for(let c=0;c<4;c++){ const col=grid.map(r=>r[c]); const[r,g]=slide(col); r.forEach((v,r2)=>grid[r2][c]=v); gained+=g; } }
  if(dir==='down')  { for(let c=0;c<4;c++){ const col=grid.map(r=>r[c]).reverse(); const[r,g]=slide(col); r.reverse().forEach((v,r2)=>grid[r2][c]=v); gained+=g; } }

  if(JSON.stringify(grid)===before) return; // no change

  score += gained; moves++;
  addRandom();

  if(!won && grid.some(row=>row.includes(2048))) {
    won = true;
    showOverlay('YOU WIN', `Score: ${score} in ${moves} moves`);
  } else if(!canMove()) {
    checkAndSaveScore();
    showOverlay('GAME OVER', `Final score: ${score}`);
  }

  updateScoreBest();
  render();
  saveState();
}

function canMove() {
  if(grid.some(row=>row.includes(0))) return true;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    const v=grid[r][c];
    if(c<3 && grid[r][c+1]===v) return true;
    if(r<3 && grid[r+1][c]===v) return true;
  }
  return false;
}

function undoMove() {
  if(!prevGrid) return;
  grid=prevGrid; score=prevScore; moves=prevMoves;
  prevGrid=null;
  updateScoreBest(); render(); saveState();
}

/* ─── Render ─────────────────────────────────────────────────── */
function render() {
  const board = document.getElementById('board');
  board.innerHTML='';
  grid.forEach(row => row.forEach(v => {
    const t = document.createElement('div');
    t.className = 'tile';
    if(v){ t.textContent=v; t.setAttribute('data-v',v); }
    board.appendChild(t);
  }));
}

/* ─── Scoring / Persistence ──────────────────────────────────── */

function getLocalScores() {
  try { return JSON.parse(localStorage.getItem(LS_SCORES)||'[]'); } catch{ return []; }
}

function saveState() {
  localStorage.setItem(LS_STATE, JSON.stringify({grid,score,moves,won}));
  localStorage.setItem(LS_UNDO,  JSON.stringify({prevGrid,prevScore,prevMoves}));
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_STATE));
    if(s && s.grid) { grid=s.grid; score=s.score; moves=s.moves; won=s.won; }
    else { newGame(); return; }
    const u = JSON.parse(localStorage.getItem(LS_UNDO)||'null');
    if(u) { prevGrid=u.prevGrid; prevScore=u.prevScore; prevMoves=u.prevMoves; }
    updateScoreBest(); render();
  } catch { newGame(); }
}

/* ─── Overlay ────────────────────────────────────────────────── */

/* ─── Leaderboard ────────────────────────────────────────────── */
let lbVisible = false;

function toggleLB() {
  lbVisible = !lbVisible;
  document.getElementById('lb-section').style.display = lbVisible ? '' : 'none';
  if(lbVisible) loadLeaderboard();
}

async function loadLeaderboard() {
  const status = document.getElementById('lb-status');
  const tbody  = document.getElementById('lb-body');
  status.textContent = 'syncing…';
  status.className   = 'lb-status';

  // Start with local scores immediately
  const local = getLocalScores();
  renderTable(local, tbody);

  // Try to fetch from git (scores.json in repo)
  try {
    const res = await fetch(SCORES_URL + '?_=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const remote = await res.json();

    // Merge remote + local, deduplicate by date+score, keep top N
    const merged = [...remote, ...local];
    merged.sort((a,b)=>b.score-a.score);
    const seen = new Set();
    const deduped = merged.filter(e=>{
      const k=`${e.score}_${e.date}`;
      if(seen.has(k)) return false;
      seen.add(k); return true;
    }).slice(0,TOP_N);

    renderTable(deduped, tbody);
    status.textContent = '✓ git';
    status.className   = 'lb-status ok';
  } catch(e) {
    status.textContent = '✓ local';
    status.className   = 'lb-status err';
  }
}

/* ─── Input: keyboard ────────────────────────────────────────── */
/* keyboard via gameKey() */

/* ─── Input: touch swipe ─────────────────────────────────────── */
let tx=0, ty=0;
document.getElementById('board').addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
},{passive:true});
document.getElementById('board').addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<15) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});

/* ─── Boot ─────────────────────────────────────── */
window.addEventListener("load", function(){ loadState(); });

function gameKey(key) {
  var map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
             w:'up',s:'down',a:'left',d:'right'};
  if(map[key]) move(map[key]);
}

function renderTable(scores,tbody){
  tbody.innerHTML=scores.map(function(s,i){
    return '<tr><td class="r">'+(i+1)+'</td><td class="sv">'+s.score.toLocaleString()+'</td><td class="dv">'+(s.date||'—')+'</td></tr>';
  }).join('');
  if(!scores.length) tbody.innerHTML='<tr><td colspan="3" style="color:var(--text-dim);padding:4px">no scores yet</td></tr>';
}

/* ── KaiOS key captur

/* Nav/button taps re-focus after action */

/* Leaderboard fetch helper */

function gameKey(key) {
  var map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
             w:'up',s:'down',a:'left',d:'right'};
  if (map[key]) move(map[key]);
  if (key === 'z' || key === 'u') undoMove();
}

function getBest() {
  var s = lbLocalScores(LS_SCORES);
  return s.length ? s[0].score : 0;
}

function updateScoreBest() {
  document.getElementById('score').textContent = score;
  document.getElementById('sk-mid').textContent = moves + ' moves';
  document.getElementById('best').textContent = Math.max(getBest(), score);
}

function showOverlay(t, m) {
  document.getElementById('ov-title').textContent = t;
  document.getElementById('ov-msg').textContent = m;
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

function checkAndSaveScore() {
  if (!score) return;
  lbSave(LS_SCORES, {score:score, moves:moves, date:new Date().toISOString().split('T')[0]},
    TOP_N, function(a,b){ return b.score - a.score; });
}

/* swipe */
var _tx=0, _ty=0;
document.querySelector('.game-area').addEventListener('touchstart', function(e) {
  _tx=e.touches[0].clientX; _ty=e.touches[0].clientY;
}, {passive:true});
document.querySelector('.game-area').addEventListener('touchend', function(e) {
  var dx=e.changedTouches[0].clientX-_tx, dy=e.changedTouches[0].clientY-_ty;
  if (Math.max(Math.abs(dx),Math.abs(dy)) < 15) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
}, {passive:true});

window.addEventListener('load', function() { loadState(); });


/* ── KaiOS key capture ─────────────────────────────────── */
var _kc = document.getElementById('key-capture');
var _act = false;



_kc.addEventListener('keydown', function(e) {
  var nav = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter','Backspace'];
  if (nav.indexOf(e.key) !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
  if (typeof gameKey === 'function') gameKey(e.key);
});

window.addEventListener('keydown', function(e) {
  if (!_act) return;
  var nav = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'];
  if (nav.indexOf(e.key) !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
}, {capture: true, passive: false});

_kc.addEventListener('blur', function() {
  setTimeout(function() {
    if (document.activeElement !== _kc) deactivateKeys();
  }, 80);
});


function lbLocalScores(k) {
  try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch(e) { return []; }
}
function lbSave(k, entry, n, sf) {
  var s = lbLocalScores(k);
  s.push(entry); s.sort(sf);
  localStorage.setItem(k, JSON.stringify(s.slice(0, n)));
}

</script>
</body>
</html>
